<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funnel Validator — Rocket Lab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg:          #F4F5F7;
    --surface:     #FFFFFF;
    --border:      #E4E6EB;
    --brand:       #5B47E0;
    --brand-light: #EDE9FD;
    --valid:       #16A34A;
    --valid-bg:    #DCFCE7;
    --invalid:     #DC2626;
    --invalid-bg:  #FEE2E2;
    --warn:        #D97706;
    --warn-bg:     #FEF3C7;
    --text:        #111827;
    --muted:       #6B7280;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; flex-direction: column; }

  .topbar { background: #18181B; height: 48px; display: flex; align-items: center; padding: 0 20px; color: #fff; z-index: 100; }
  .logo-mark { width: 26px; height: 26px; background: var(--brand); border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 14px; }
  
  .layout { display: flex; flex: 1; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; }
  .sidebar-item { padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--muted); border-left: 2px solid transparent; }
  .sidebar-item.active { background: var(--brand-light); color: var(--brand); border-left-color: var(--brand); }

  .main { flex: 1; padding: 28px 32px; overflow-x: hidden; }
  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; transition: box-shadow 0.15s; }
  .kpi-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .kpi-value { font-size: 24px; font-weight: 700; }

  .upload-zone { border: 1.5px dashed var(--border); border-radius: var(--radius-lg); padding: 40px; text-align: center; cursor: pointer; background: #fff; }
  .upload-zone:hover { border-color: var(--brand); background: var(--brand-light); }
  
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #F8F9FB; padding: 12px; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid #ECEEF2; }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-valid { background: var(--valid-bg); color: var(--valid); }
  .badge-invalid { background: var(--invalid-bg); color: var(--invalid); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); }

  .filter-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
  .tab { padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: #fff; }
  .tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  .btn { padding: 10px 20px; border-radius: var(--radius); font-weight: 600; cursor: pointer; border: none; background: var(--brand); color: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark">🚀</div> RocketLab — Funnel Validator
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-item active">📊 Validador</div>
  </aside>

  <main class="main">
    <div class="kpi-grid" id="statsSection" style="display:none">
      <div class="kpi-card"><div class="kpi-label">Total IDs</div><div class="kpi-value" id="statTotal">0</div></div>
      <div class="kpi-card"><div class="kpi-label">Funnel OK</div><div class="kpi-value" style="color:var(--valid)" id="statValidSteps">0</div></div>
      <div class="kpi-card"><div class="kpi-label">Faltan Pasos</div><div class="kpi-value" style="color:var(--invalid)" id="statInvalidSteps">0</div></div>
      <div class="kpi-card"><div class="kpi-label">Geo Alert</div><div class="kpi-value" style="color:var(--warn)" id="statSuspicious">0</div></div>
      <div class="kpi-card"><div class="kpi-label">Facturables</div><div class="kpi-value" style="color:var(--brand)" id="statClean">0</div></div>
    </div>

    <div id="uploadCard" class="upload-zone" onclick="document.getElementById('csvInput').click()">
      <input type="file" accept=".csv" id="csvInput" style="display:none" />
      <h2>Cargar CSV de AppsFlyer</h2>
      <p>Se validarán Step 5 y Completed Contratado + Geolocalización</p>
    </div>

    <div id="resultsSection" style="display:none">
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all', this)">Todos</button>
        <button class="tab" onclick="setFilter('clean', this)">✅ Facturables</button>
        <button class="tab" onclick="setFilter('invalid', this)">✗ Inválidos</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>AppsFlyer ID</th>
              <th>Criterio 1 (Funnel)</th>
              <th>Criterio 2 (Geo)</th>
              <th>Pasos Registrados</th>
              <th>Ciudades</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
// ELIMINADO: af_apertura_cuenta_en_linea_no_cliente-app_page_visit
const STEPS = [
  'af_apertura_cuenta_en_linea_no_cliente-app_step_5',
  'af_apertura_cuenta_en_linea_no_cliente-app_completed_contratado'
];
const CFG = { minCityTravel: 3600, minStateTravel: 7200 }; // segundos
let allResults = [];

document.getElementById('csvInput').addEventListener('change', e => {
  if (e.target.files[0]) {
    Papa.parse(e.target.files[0], {
      header: true,
      skipEmptyLines: true,
      complete: r => analyze(r.data)
    });
  }
});

function analyze(rows) {
  const byId = {};
  rows.forEach(row => {
    const id = row['AppsFlyer ID'] || row['appsflyer_id'] || '';
    const event = row['Event Name'] || row['event_name'] || '';
    if (!id || !event) return;
    if (!byId[id]) byId[id] = [];
    byId[id].push({
      event: event.trim(),
      time: new Date(row['Event Time'] || row['event_time']),
      city: (row['City'] || '').toLowerCase(),
      state: (row['State'] || '').toLowerCase()
    });
  });

  allResults = Object.entries(byId).map(([id, events]) => {
    // 1. Validar Funnel (Sin page_visit)
    const registered = STEPS.filter(s => events.some(e => e.event === s));
    const isComplete = registered.length === STEPS.length;

    // 2. Validar Geo
    const sorted = events.sort((a, b) => a.time - b.time);
    let geoIssue = false;
    for (let i = 1; i < sorted.length; i++) {
      const p = sorted[i-1], c = sorted[i];
      const diff = (c.time - p.time) / 1000;
      if (p.city && c.city && p.city !== c.city && diff < CFG.minCityTravel) geoIssue = true;
      if (p.state && c.state && p.state !== c.state && diff < CFG.minStateTravel) geoIssue = true;
    }

    return {
      id,
      isComplete,
      geoIssue,
      status: !isComplete ? 'invalid' : (geoIssue ? 'suspicious' : 'clean'),
      registered,
      cities: [...new Set(events.map(e => e.city).filter(Boolean))]
    };
  });

  renderUI();
}

function renderUI() {
  document.getElementById('statsSection').style.display = 'grid';
  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('uploadCard').style.display = 'none';

  const comp = allResults.filter(r => r.isComplete).length;
  const susp = allResults.filter(r => r.isComplete && r.geoIssue).length;

  document.getElementById('statTotal').textContent = allResults.length;
  document.getElementById('statValidSteps').textContent = comp;
  document.getElementById('statInvalidSteps').textContent = allResults.length - comp;
  document.getElementById('statSuspicious').textContent = susp;
  document.getElementById('statClean').textContent = comp - susp;

  setFilter('all');
}

function setFilter(f, btn) {
  if (btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  const filtered = f === 'all' ? allResults : 
                 f === 'clean' ? allResults.filter(r => r.status === 'clean') : 
                 allResults.filter(r => r.status === 'invalid');

  document.getElementById('tableBody').innerHTML = filtered.map(r => `
    <tr>
      <td style="font-family:var(--mono)">${r.id}</td>
      <td><span class="badge ${r.isComplete ? 'badge-valid' : 'badge-invalid'}">${r.isComplete ? 'Completo' : 'Faltan Pasos'}</span></td>
      <td><span class="badge ${r.geoIssue ? 'badge-warn' : 'badge-valid'}">${r.geoIssue ? 'Sospechoso' : 'Lógico'}</span></td>
      <td>${STEPS.map(s => r.registered.includes(s) ? '✅' : '❌').join(' ')}</td>
      <td style="font-size:11px; color:var(--muted)">${r.cities.join(' → ')}</td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
